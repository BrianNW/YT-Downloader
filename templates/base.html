<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Video Downloader{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="brand-group">
          <a class="brand" href="{{ url_for('index') }}">Video Downloader</a>
          <span class="brand-tag">Local MP4 download hub</span>
        </div>
        <nav class="nav-links">
          <a href="{{ url_for('app_page') }}">Downloader</a>
          <a href="{{ url_for('compress_page') }}">Compress</a>
          <a href="{{ url_for('history_page') }}">History</a>
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle color theme">
            <span id="theme-icon">🌙</span>
          </button>
        </nav>
      </header>

      <main>
        {% block content %}{% endblock %}
      </main>

      <footer>
        Built with Flask + yt-dlp · run <code>python desktop.py</code> for a desktop-style launcher.
      </footer>
    </div>
    {% block scripts %}{% endblock %}
    <script>
      const themeToggle = document.getElementById('theme-toggle');
      const themeIcon = document.getElementById('theme-icon');
      const storedTheme = localStorage.getItem('yt-downloader-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const initialTheme = storedTheme || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', initialTheme);
      if (initialTheme === 'dark') themeIcon.textContent = '☀️';

      themeToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', nextTheme);
        localStorage.setItem('yt-downloader-theme', nextTheme);
        themeIcon.textContent = nextTheme === 'dark' ? '☀️' : '🌙';
      });
    </script>
  </body>
</html>
